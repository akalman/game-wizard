modules: [ core ]
initial-screen: initial-cutscene
close-screen: end-game

#######
# STATE
#######

state:
  flags:
  # track dialog progress for each NPC.
  - id: shopkeep-progress
    values: [ unseen, open, success, fail ]
    initial-value: unseen

  - id: enthusiast-progress
    values: [ unseen, open, success, fail ]
    initial-value: unseen

  - id: stranger-progress
    values: [ unseen, open, success, fail ]
    initial-value: unseen

#########
# SCREENS
#########

screens:
- id: initial-cutscene
  template: core.dialog-cutscene
  config: res://examples/basic-visual-novel/screens/initial-cutscene.yaml

- id: world-map
  template: core.landmark-overworld
  config: res://examples/basic-visual-novel/screens/world-map.yaml

# for each npc we need screens to cover the full dialog tree.  this consists of: a) two into variant scenes, one for
# initial visit and one for revisits; b) a menu to select dialog options, in this case with three outcomes; and c)
# shared dialog cutscenes for both prior to the dialog choice and for each dialog choice.

# shopkeep
- id: shopkeep-cutscene
  template: core.dialog-cutscene
  config: res://examples/basic-visual-novel/screens/shopkeep/shopkeep-cutscene.yaml

- id: shopkeep-dialog-choice
  template: core.menu
  config: res://examples/basic-visual-novel/screens/shopkeep/shopkeep-dialog-choice.yaml

# enthusiast
- id: enthusiast-cutscene
  template: core.dialog-cutscene
  config: res://examples/basic-visual-novel/screens/enthusiast/enthusiast-cutscene.yaml

- id: enthusiast-dialog-choice
  template: core.menu
  config: res://examples/basic-visual-novel/screens/enthusiast/enthusiast-dialog-choice.yaml

# stranger
- id: stranger-cutscene
  template: core.dialog-cutscene
  config: res://examples/basic-visual-novel/screens/stranger/stranger-cutscene.yaml

- id: stranger-dialog-choice
  template: core.menu
  config: res://examples/basic-visual-novel/screens/stranger/stranger-dialog-choice.yaml

# separate screen for each ending
- id: win-cutscene
  template: core.dialog-cutscene
  config: res://examples/basic-visual-novel/screens/win-cutscene.yaml

- id: lose-cutscene
  template: core.dialog-cutscene
  config: res://examples/basic-visual-novel/screens/lose-cutscene.yaml

#######
# EDGES
#######

edges:
- initial-cutscene => terminal-frame => world-map;

# we want to vary the start of the npc dialog depending on if you've seen the npc before. this is
# handled within the config for the dialog cutscene.  for now we just need to handle connecting
# the dialog cutscene to the menu for getting dialog choice inputs from the user.
- world-map => navigate.shopkeep-location => shopkeep-cutscene;
- shopkeep-cutscene => dialog-event.question => shopkeep-dialog-choice;

# when the user finishes interacting with the menu, we provide their final choice back the parent
# as part of the edge traversal logic.
- shopkeep-dialog-choice => terminal-select => ref://parent;

# set the game state flags based on user choice.  this is done after the associated cutscene by
# convention.  it could also be done during the edge back into the cutscene from the dialog
# choice, or it could have been done in response to dialog block being or end events.
- shopkeep-cutscene => terminal-frame.success => ref://parent;
  set flag shopkeep-progress to success;
- shopkeep-cutscene => terminal-frame.fail => ref://parent;
  set flag shopkeep-progress to fail;
- shopkeep-cutscene => terminal-frame.open => ref://parent;
  set flag shopkeep-progress to open;


# repeat above edges for other two NPCs.
# enthusiast
- world-map => navigate.enthusiast-location => enthusiast-cutscene;
- enthusiast-cutscene => dialog-event.question => enthusiast-dialog-choice;

- enthusiast-dialog-choice => terminal-select => ref://parent;

- enthusiast-cutscene => terminal-frame.success => ref://parent;
  set flag enthusiast-progress to success;
- enthusiast-cutscene => terminal-frame.fail => ref://parent;
  set flag enthusiast-progress to fail;
- enthusiast-cutscene => terminal-frame.open => ref://parent;
  set flag enthusiast-progress to open;

# stranger
- world-map => navigate.stranger-location => stranger-cutscene;
- stranger-cutscene => dialog-event.question => stranger-dialog-choice;

- stranger-dialog-choice => terminal-select => ref://parent;

- stranger-cutscene => terminal-frame.success => ref://parent;
  set flag stranger-progress to success;
- stranger-cutscene => terminal-frame.fail => ref://parent;
  set flag stranger-progress to fail;
- stranger-cutscene => terminal-frame.open => ref://parent;
  set flag stranger-progress to open;


# end game is available from the world map once all flags are success or fail.
# if they're all success, go to win cutscene, otherwise lose cutscene.
- world-map => navigate.ending;
  when flag shopkeep-progress in [success];
  when flag enthusiast-progress in [success];
  when flag stranger-progress in [success] => win-cutscene;
  else => lose-cutscene;

# close the game after ending cutscenes
- win-cutscene => terminal-frame.conversation => end-game;
- lose-cutscene => terminal-frame.conversation => end-game;