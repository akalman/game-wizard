modules: [ core ]
screens:
- screen-id: world-map
  template: core.landmark-overworld
  config: res://examples/basic-visual-novel/screens/world-map.yaml
- screen-id: repeatable-dialog-cutscene
  template: core.dialog-cutscene
  config: res://examples/basic-visual-novel/screens/repeatable-dialog-cutscene.yaml
  is-overlay: true
  halts-inputs: true
edges:
- source: world-map
  type: navigate
  edge: start-dialog
  condition:
    type: flag
    name: seen-dialog
    comparator: equals
    target: yes
- source: world-map
  type: navigate
  edge: start-dialog
  destination: repeatable-dialog-cutscene
- source: world-map
  type: navigate
  edge: exit-game
- source: repeatable-dialog-cutscene
  type: complete
  edge: end-dialog
  effects:
  - type: set-flag
    target: seen-dialog
    value: yes
state:
  flags:
  - flag-id: seen-dialog
    values: [ yes, no ]
    initial-value: no
initial-screen: world-map
