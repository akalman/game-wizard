overworld-id: world-map
map:
  texture-path: res://examples/basic-visual-novel/sprites/world-map.png
  scaling-type: fit-width
landmarks:

# create a landmark for each NPC to interact with.
# only show the landmark if the state for that NPC is unconcluded.
- id: shopkeep-landmark
  texture: res://examples/basic-visual-novel/sprites/world-map-landmark-a.png
  event-id: shopkeep-location
  size: ( 200 200 )
  offset: ( -0.6 -0.4 )
  conditions:
  - predicate: flag-in
    target: shopkeep-progress
    set: [ unseen, open ]

- id: enthusiast-landmark
  texture: res://examples/basic-visual-novel/sprites/world-map-landmark-a.png
  event-id: enthusiast-location
  size: ( 200 200 )
  offset: ( 0.6 -0.4 )
  conditions:
  - predicate: flag-in
    target: enthusiast-progress
    set: [ unseen, open ]

- id: stranger-landmark
  texture: res://examples/basic-visual-novel/sprites/world-map-landmark-a.png
  event-id: stranger-location
  size: ( 200 200 )
  offset: ( -0.6 0.4 )
  conditions:
  - predicate: flag-in
    target: stranger-progress
    set: [ unseen, open ]

# create a new landmark that only shows up once all the NPCs have concluded.
- id: ending-landmark
  texture: res://examples/basic-visual-novel/sprites/world-map-landmark-a.png
  event-id: ending
  size: ( 200 200 )
  offset: ( 0.6 0.4 )
  conditions:
  - predicate: flag-in
    target: stranger-progress
    set: [ success, fail ]
  - predicate: flag-in
    target: enthusiast-progress
    set: [ success, fail ]
  - predicate: flag-in
    target: stranger-progress
    set: [ success, fail ]
