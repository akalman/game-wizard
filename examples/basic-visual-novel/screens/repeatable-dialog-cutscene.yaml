dialog-id: test-dialog-scene
frames:
  - frame-id: initial-textbox
    state:
      left-character-ids: [ char-a ]
      right-character-ids: [ char-b ]
      dialog-text: This is the the expected initial textbox content
    edges:
      - input: advance
        destination-frame: add-in-character
      - input: skip
  - frame-id: add-in-character
    state:
      left-character-ids: [ char-a ]
      right-character-ids: [ char-b, char-c ]
      dialog-text: This is the expected textbox content after adding an extra character to the right side of the screen.
    edges:
      - input: advance
        destination-frame: move-character
      - input: skip
  - frame-id: move-character
    state:
      left-character-ids: [ char-a, char-c ]
      right-character-ids: [ char-b ]
      dialog-text: This is the expected textbox content after moving the new character to the left side of the screen.
    edges:
      - input: advance
      - input: skip
characters:
  - character-id: char-a
    sprite-path: res://examples/basic-visual-novel/sprites/char-a-profile.png
  - character-id: char-b
    sprite-path: res://examples/basic-visual-novel/sprites/char-b-profile.png
  - character-id: char-c
    sprite-path: res://examples/basic-visual-novel/sprites/char-c-profile.png
initial-frame-id: initial-textbox
complete-edge: end-dialog
