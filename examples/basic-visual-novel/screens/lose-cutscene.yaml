id: lose-cutscene
initial-block: conversation
terminal-block: end-conversation

characters:
  - id: mc
    sprite-path: res://examples/basic-visual-novel/sprites/char-masc-meso.png
  - id: future-mc
    sprite-path: res://examples/basic-visual-novel/sprites/char-masc-meso.png

blocks:
- id: conversation
  updates:
  - type: core.dialog-cutscene.add-left-character
    character: mc
  - type: core.dialog-cutscene.set-text
    text: |
        [b]You:[/b] Ok so I talked to everyone and I definitely
        did not get all three flags. Some of those conversations
        did not go great.
  - type: core.dialog-cutscene.add-right-character
    character: future-mc
  - type: core.dialog-cutscene.set-text
    text: |
        [b]Future You:[/b] Yeah I can see that. I'm literally
        flickering right now. That's not a good sign for the
        whole "reality staying intact" thing.
  - type: core.dialog-cutscene.set-text
    text: |
        [b]You:[/b] In my defense, one of those people had 247
        named flags and I panicked.
  - type: core.dialog-cutscene.set-text
    text: |
        [b]Future You:[/b] Well this is awkward. Reality is
        going to collapse now. The good news is it'll be quick.
        The bad news is everything. Everything is the bad news.
  - type: core.dialog-cutscene.set-text
    text: |
        [b]You:[/b] So... no coffee then?
  - type: core.dialog-cutscene.set-text
    text: |
        [b]Future You:[/b] No coffee. No anything. It was nice
        being us though. For the like twenty minutes it lasted.
        Bye, me.
  - type: core.dialog-cutscene.remove-right-character
    character: future-mc
  - type: core.dialog-cutscene.set-text
    text: |
        [b]You:[/b] Well. That's the end of everything I guess.
        Should have been nicer to people. Lesson l-
  edges:
  - event-id: core.dialog-cutscene.end-block.conversation
    destination: end-conversation
