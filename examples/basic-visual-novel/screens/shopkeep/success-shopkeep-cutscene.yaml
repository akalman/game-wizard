dialog-id: success-shopkeep-cutscene
initial-frame-id: conv-01
complete-edge: complete

characters:
  - character-id: mc
    sprite-path: res://examples/basic-visual-novel/sprites/char-masc-meso.png
  - character-id: shopkeep
    sprite-path: res://examples/basic-visual-novel/sprites/char-masc-meso.png

frames:
  - frame-id: conv-01
    state:
      left-character-ids: [ mc ]
      right-character-ids: [ shopkeep ]
      dialog-text: |
        [b]Shopkeep:[/b] Oh... oh my. That's the nicest thing
        anyone has ever said to me. And about my SHOP no less!
    edges:
      - input: advance
        destination-frame: conv-02
      - input: skip
  - frame-id: conv-02
    state:
      left-character-ids: [ mc ]
      right-character-ids: [ shopkeep ]
      dialog-text: |
        [b]Shopkeep:[/b] You know what? Take the flag. Take it!
        It's yours! No charge! Well, the compliment was the charge.
        That's how my economy works.
    edges:
      - input: advance
        destination-frame: conv-03
      - input: skip
  - frame-id: conv-03
    state:
      left-character-ids: [ mc ]
      right-character-ids: [ shopkeep ]
      dialog-text: |
        [b]You:[/b] Wow, really? Thanks! That was way easier than
        I expected.
    edges:
      - input: advance
        destination-frame: conv-04
      - input: skip
  - frame-id: conv-04
    state:
      left-character-ids: [ mc ]
      right-character-ids: [ shopkeep ]
      dialog-text: |
        [b]Shopkeep:[/b] Please come back and compliment me again
        sometime! Or don't! I'll just be here! Selling flags!
        To nobody!
    edges:
      - input: advance
        destination-frame: conv-05
      - input: skip
  - frame-id: conv-05
    state:
      left-character-ids: [ mc ]
      right-character-ids: [ ]
      dialog-text: |
        [b]You:[/b] Got the flag! One down. I'm starting to think
        saving reality might actually be pretty easy.
    edges:
      - input: advance
      - input: skip
