dialog-id: shared-stranger-cutscene
initial-frame-id: conv-01
complete-edge: complete

characters:
  - character-id: mc
    sprite-path: res://examples/basic-visual-novel/sprites/char-masc-meso.png
  - character-id: stranger
    sprite-path: res://examples/basic-visual-novel/sprites/char-masc-meso.png

frames:
  - frame-id: conv-01
    state:
      left-character-ids: [ mc ]
      right-character-ids: [ stranger ]
      dialog-text: |
        [b]Stranger:[/b] Ok. The scene is set. You've just
        rounded a corner at speed and crashed directly into me,
        a stranger. Now. What do you say?
    edges:
      - input: advance
        destination-frame: conv-02
      - input: skip
  - frame-id: conv-02
    state:
      left-character-ids: [ mc ]
      right-character-ids: [ stranger ]
      dialog-text: |
        [b]You:[/b] Can I get a hint?
    edges:
      - input: advance
        destination-frame: conv-03
      - input: skip
  - frame-id: conv-03
    state:
      left-character-ids: [ mc ]
      right-character-ids: [ stranger ]
      dialog-text: |
        [b]Stranger:[/b] NO HINTS. This is about INSTINCT. It's
        about what your HEART tells you to say when you slam into
        a stranger at a corner. Just pick one. You'll know the
        right answer when you feel it.
    edges:
      - input: advance
      - input: skip
