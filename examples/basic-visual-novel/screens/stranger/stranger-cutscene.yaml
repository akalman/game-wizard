id: stranger-cutscene
initial-block: route-coversation
terminal-block: end-conversation
characters:
  - id: mc
    sprite-path: res://examples/basic-visual-novel/sprites/char-masc-meso.png
  - id: stranger
    sprite-path: res://examples/basic-visual-novel/sprites/char-masc-meso.png

blocks:
###
# Route Conversation
###
- id: route-coversation
  edges:
  - event-id: core.dialog-cutscene.end-block.route-coversation
    destination: initial
    conditions:
    - predicate: flag-in
      target: stranger-progress
      set: [ unseen ]
  - event-id: core.dialog-cutscene.end-block.route-coversation
    destination: revisit

###
# Initial
###
- id: initial
  updates:
  - type: core.dialog-cutscene.add-left-character
    character: mc
  - type: core.dialog-cutscene.set-text
    text: |
        [b]You:[/b] Ok let me just go around this corner and—

  - type: core.dialog-cutscene.add-right-character
    character: stranger
  - type: core.dialog-cutscene.set-text
    text: |
        [b]BONK.[/b]

  - type: core.dialog-cutscene.set-text
    text: |
        [b]You:[/b] OW! Oh god I'm so sorry I didn't see you
        there I— my toast! I dropped my toast!

  - type: core.dialog-cutscene.set-text
    text: |
        [b]Stranger:[/b] No. No no no. Stop. You didn't say
        the line.

  - type: core.dialog-cutscene.set-text
    text: |
        [b]You:[/b] ...the line? What line? I just physically
        collided with you.

  - type: core.dialog-cutscene.set-text
    text: |
        [b]Stranger:[/b] When you crash into someone at a corner
        you have to SAY THE LINE. Everyone knows this. It's like
        the most important part. The crash means nothing without
        the line.

  - type: core.dialog-cutscene.set-text
    text: |
        [b]You:[/b] I genuinely have no idea what you're talking
        about.

  - type: core.dialog-cutscene.set-text
    text: |
        [b]Stranger:[/b] Ok look. I'll give you a flag if you
        do this right. But you have to say the line. I've been
        standing at this corner ALL DAY waiting for someone to
        crash into me and say it.

  - type: core.dialog-cutscene.set-text
    text: |
        [b]You:[/b] That's... honestly kind of sad.

  - type: core.dialog-cutscene.set-text
    text: |
        [b]Stranger:[/b] It's not SAD it's TRADITION. Now. Let's
        try this again.
  edges:
  - event-id: core.dialog-cutscene.end-block.initial
    destination: shared

###
# Revisit
###
- id: revisit
  updates:
  - type: core.dialog-cutscene.add-left-character
    character: mc
  - type: core.dialog-cutscene.set-text
    text: |
        [b]You:[/b] Ok, the corner person. Let me just—

  - type: core.dialog-cutscene.add-right-character
    character: stranger
  - type: core.dialog-cutscene.set-text
    text: |
        [b]BONK.[/b]

  - type: core.dialog-cutscene.set-text
    text: |
        [b]Stranger:[/b] Good, you're back. Very committed
        crash this time. Really felt that one in my ribs. Now
        are you ready to say the line?

  - type: core.dialog-cutscene.set-text
    text: |
        [b]You:[/b] I'm going to be honest, I walked away last
        time and still have no idea what the line is. But let's
        do this.

  edges:
  - event-id: core.dialog-cutscene.end-block.revisit
    destination: shared

###
# Shared
###
- id: shared
  updates:
  - type: core.dialog-cutscene.set-text
    text: |
        [b]Stranger:[/b] Ok. The scene is set. You've just
        rounded a corner at speed and crashed directly into me,
        a stranger. Now. What do you say?

  - type: core.dialog-cutscene.set-text
    text: |
        [b]You:[/b] Can I get a hint?

  - type: core.dialog-cutscene.set-text
    text: |
        [b]Stranger:[/b] NO HINTS. This is about INSTINCT. It's
        about what your HEART tells you to say when you slam into
        a stranger at a corner. Just pick one. You'll know the
        right answer when you feel it.
  edges:
  - event-id: core.dialog-cutscene.end-block.shared
    destination: question
  - event-id: core.menu.terminal-select.success
    destination: success
  - event-id: core.menu.terminal-select.fail
    destination: fail
  - event-id: core.menu.terminal-select.open
    destination: open

###
# Success
###
- id: success
  updates:
  - type: core.dialog-cutscene.set-text
    text: |
        [b]Stranger:[/b] ...

  - type: core.dialog-cutscene.set-text
    text: |
        [b]Stranger:[/b] YES!! "I'M LATE! I'M LATE!" THAT'S
        THE LINE!! YOU SAID IT!! OH MY GOD!!

  - type: core.dialog-cutscene.set-text
    text: |
        [b]Stranger:[/b] Do you know how LONG I've been standing
        at this corner?! WEEKS! And nobody ever says the line!!
        They just say "sorry" or "ow" like ANIMALS!!

  - type: core.dialog-cutscene.set-text
    text: |
        [b]Stranger:[/b] Here! Take this flag! You've earned it!
        You are a person of CULTURE and TASTE and PROPER
        CORNER-COLLISION ETIQUETTE!

  - type: core.dialog-cutscene.remove-right-character
    character: stranger
  - type: core.dialog-cutscene.set-text
    text: |
        [b]You:[/b] Got a flag because I said "I'm late" after
        bumping into someone. Sure. This is the reality I'm
        trying to save. Ok. Now they can finally go to school
        I guess.
  edges:
  - event-id: core.dialog-cutscene.end-block.success
    destination: end-conversation

###
# Fail
###
- id: fail
  updates:
  - type: core.dialog-cutscene.set-text
    text: |
        [b]Stranger:[/b] ...what?

  - type: core.dialog-cutscene.set-text
    text: |
        [b]Stranger:[/b] That's... ok I need a minute. I need
        to go process that. Stay right here. I'll be back. I
        just need to go around the corner and think about what
        you just said to me.

  - type: core.dialog-cutscene.remove-right-character
    character: stranger
  - type: core.dialog-cutscene.set-text
    text: |
        [b]You:[/b] Ok. I'll just wait here I guess. They
        seemed pretty shaken up. Maybe I should have just
        said the line.

  - type: core.dialog-cutscene.set-text
    text: |
        [b]You:[/b] ...they've been gone for a while. Let me
        go check around the corner.

  - type: core.dialog-cutscene.set-text
    text: |
        [b]You:[/b] Oh. Oh no. They're dead. They are actually
        dead. On the ground. Behind the corner. What.

  - type: core.dialog-cutscene.set-text
    text: |
        [b]You:[/b] Did... did I do that?! Was it the thing I
        said?! That's not how that's supposed to work!! It's
        just a THING PEOPLE SAY!

  - type: core.dialog-cutscene.set-text
    text: |
        [b]You:[/b] Ok I need to leave. Right now. Before
        someone sees me standing next to a dead stranger behind
        a corner. No flag. No nothing. I'm just going to walk
        away very quickly and never speak of this again.
  edges:
  - event-id: core.dialog-cutscene.end-block.fail
    destination: end-conversation

###
# Open
###
- id: open
  updates:
  - type: core.dialog-cutscene.set-text
    text: |
        [b]Stranger:[/b] What did you just say to me?

  - type: core.dialog-cutscene.set-text
    text: |
        [b]Stranger:[/b] How do you know about that?! WHO SENT
        YOU?! I KNEW they were watching! I KNEW the corner was
        compromised!

  - type: core.dialog-cutscene.set-text
    text: |
        [b]You:[/b] I don't— I literally just said sounds! I
        was guessing! I don't know what any of this is!

  - type: core.dialog-cutscene.set-text
    text: |
        [b]Stranger:[/b] Leave. NOW. And don't come back until
        you've lost their trail. I can't be seen with you while
        they're listening. Go. Walk around. Act natural. Come
        back when you're CLEAN.

  - type: core.dialog-cutscene.remove-right-character
    character: stranger
  - type: core.dialog-cutscene.set-text
    text: |
        [b]You:[/b] I don't know who "they" are. I don't know
        what trail I'm losing. But sure. I'll go walk around
        and come back and pretend that accomplished something.
  edges:
  - event-id: core.dialog-cutscene.end-block.open
    destination: end-conversation
